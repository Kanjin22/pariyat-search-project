<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>จัดการเจ้าหน้าที่ ธรรม-บาลี</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="{{ static_asset_url('style.css') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <header class="main-header">
        <h1>จัดการเจ้าหน้าที่ระบบ</h1>
        <p>เพิ่ม แก้ไข และลบบัญชีเจ้าหน้าที่ที่มีสิทธิ์จัดการผลการสอบ</p>
        {% include '_nav.html' %}
      </header>

      <main class="search-area">
        <section class="page-intro">
          <h2>เพิ่มเจ้าหน้าที่ใหม่</h2>
        </section>

        <form id="add-staff-form" class="login-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="new-username">ชื่อผู้ใช้</label>
              <input class="form-input" type="text" id="new-username" name="username" required />
            </div>
            <div class="form-group">
              <label class="form-label" for="new-fullname">ชื่อ-สกุล (ถ้ามี)</label>
              <input class="form-input" type="text" id="new-fullname" name="full_name" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="new-role">สิทธิ์การเข้าถึง</label>
              <select class="form-input" id="new-role" name="role">
                <option value="staff">Staff (จัดการผลสอบ)</option>
                <option value="admin">Admin (จัดการทุกอย่าง)</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="new-password">รหัสผ่าน</label>
              <input class="form-input" type="password" id="new-password" name="password" required />
            </div>
          </div>
          <button type="submit" class="save-result-btn">เพิ่มเจ้าหน้าที่</button>
        </form>

        <div id="staff-message" class="save-message" aria-live="polite"></div>

        <section class="staff-list-section">
          <h2 class="staff-section-title">รายชื่อเจ้าหน้าที่ทั้งหมด</h2>
          <div id="staff-list-container"></div>
        </section>
      </main>

      {% include '_site_footer.html' %}
    </div>

    <script>
      window.currentStaffUsername = {{ session.staff_username | tojson }};
    </script>
    <script src="{{ static_asset_url('theme.js') }}"></script>
    <script src="{{ static_asset_url('staff_management.js') }}"></script>
  </body>
</html>
