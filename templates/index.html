<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ค้นหารายชื่อผู้สมัครสอบ ธรรม-บาลี</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <header class="main-header">
        <h1>ระบบค้นหารายชื่อผู้สมัครสอบ ธรรม-บาลีสนามหลวง</h1>
        <p>ในนามวัดพระธรรมกาย จ.ปทุมธานี ประจำปี พ.ศ. {{ current_buddhist_year }}</p>
        <nav class="top-nav">
          <a class="nav-link active" href="{{ url_for('index') }}">หน้าค้นหารายชื่อ</a>
          {% if staff_logged_in %}
          <a class="nav-link" href="{{ url_for('manage_results') }}">หน้าจัดการผลการสอบ</a>
          <form class="inline-form" method="post" action="{{ url_for('staff_logout') }}">
            <button type="submit" class="nav-link nav-button">ออกจากระบบเจ้าหน้าที่</button>
          </form>
          {% else %}
          <a class="nav-link" href="{{ url_for('staff_login', next=url_for('manage_results')) }}">เข้าสู่ระบบเจ้าหน้าที่</a>
          {% endif %}
        </nav>
      </header>

      <section class="data-info-section">
        <div class="info-text">
          ข้อมูล ณ <span id="info-timestamp">กำลังโหลด...</span>
          (<span id="info-count">0</span> รายการ)
        </div>
      </section>

      <main class="search-area">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="พิมพ์ชื่อ-ฉายา หรือนามสกุล เพื่อค้นหา..." />
        </div>
        <div id="results-container"></div>
      </main>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
